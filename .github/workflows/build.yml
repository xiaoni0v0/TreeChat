name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            artifact-name: TreeChat-linux
            binary-path: dist/TreeChat
          - os: windows-latest
            artifact-name: TreeChat-windows.exe
            binary-path: dist/TreeChat.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyinstaller pillow

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x build.sh
          bash build.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.binary-path }}
          if-no-files-found: error
